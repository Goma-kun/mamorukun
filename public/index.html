<!DOCTYPE html>
<html lang="ja" class="bg-slate-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>まもるくん - AI応対ログ・アシスタント</title>
    <!-- ステータスバー・アドレスバーを黒系に（iOS Safari / PWA / Android Chrome） -->
    <meta name="theme-color" content="#0f172a">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="まもるくん">
    <meta name="msapplication-navbutton-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { background-color: #0f172a; }
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at top left, #1f2937 0, #020617 55%, #000000 100%);
            color: #e5e7eb;
            font-family: system-ui, -apple-system, BlinkMacSystemFont,
                "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
            overscroll-behavior-y: none;
        }

        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        
        .ai-message {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.9), rgba(91, 33, 182, 0.9));
            border: 1px solid rgba(129, 140, 248, 0.5);
            padding: 1rem 1.15rem;
            margin-bottom: 1rem;
            border-radius: 0.9rem;
            word-break: break-all;
            overflow-wrap: anywhere;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.95);
        }

        .user-message {
            background: linear-gradient(135deg, rgba(5, 150, 105, 0.95), rgba(8, 47, 73, 0.95));
            border: 1px solid rgba(45, 212, 191, 0.55);
            padding: 1rem 1.15rem;
            margin-bottom: 1rem;
            border-radius: 0.9rem;
            word-break: break-all;
            overflow-wrap: anywhere;
            box-shadow: 0 16px 40px rgba(8, 47, 73, 0.9);
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .whitespace-pre-wrap { white-space: pre-wrap; word-break: break-all; overflow-wrap: anywhere; }
        
        button:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        input, select, textarea { font-size: 16px !important; }
        #chat-input { resize: vertical; min-height: 2.5rem; }
        #history-panel { transition: transform 0.25s ease; }
    </style>
</head>
<body class="bg-slate-900 p-2 sm:p-5 h-[100dvh] flex flex-col text-base overflow-hidden">
    <div class="max-w-4xl mx-auto w-full flex-grow flex flex-col h-full gap-1 sm:gap-3">
        <header class="flex justify-between items-center mb-0 shrink-0 bg-slate-900/70 border border-slate-800 rounded-xl px-2.5 sm:px-4 py-1 sm:py-1.5 shadow-[0_12px_40px_rgba(15,23,42,0.9)] backdrop-blur">
            <h1 id="app-title" class="text-base sm:text-lg md:text-xl font-extrabold tracking-wide text-sky-400 drop-shadow-[0_0_14px_rgba(56,189,248,0.4)] leading-tight">
                🛡️ まもるくん
            </h1>
            <div class="flex items-center gap-1.5 sm:gap-2">
                <button id="history-btn" class="bg-slate-800/90 border border-slate-600 text-slate-200 text-sm rounded-xl px-2.5 py-1.5 cursor-pointer hover:bg-slate-700 transition-all shadow-inner shadow-black/40" title="セッション履歴">📂</button>
                <select id="lang-toggle" class="bg-slate-900/80 border border-slate-600 text-slate-200 text-xs sm:text-sm rounded-xl px-2.5 py-1.5 cursor-pointer outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 shadow-inner shadow-black/40">
                    <option value="ja" selected>🇯🇵 日本語</option>
                    <option value="en">🇺🇸 English</option>
                </select>
            </div>
        </header>

        <div id="error-banner" class="hidden mb-3 relative z-[60]">
            <div class="bg-rose-600 text-white text-xs sm:text-sm px-3 py-2 rounded-lg flex justify-between items-start gap-2 shadow-lg">
                <div id="error-banner-message" class="whitespace-pre-wrap"></div>
                <button id="error-banner-close" class="text-white/80 hover:text-white text-lg leading-none px-1">×</button>
            </div>
        </div>

        <!-- 疑問文トースト（最大5件・右下に縦積み・新しいほど下） -->
        <div id="auto-question-toast-stack" class="fixed bottom-24 right-2 sm:right-3 z-[70] flex flex-col gap-2 items-end pointer-events-none w-[calc(100%-1rem)] max-w-[20rem] sm:max-w-[22rem]" aria-live="polite"></div>

        <div class="flex flex-col flex-1 min-h-0 gap-1.5 sm:gap-2 mt-0 sm:mt-1">
            <!-- 文字起こし / ログ & レポート カード -->
            <div class="bg-slate-900/70 border border-slate-800 rounded-2xl shadow-[0_22px_60px_rgba(15,23,42,0.98)] backdrop-blur flex flex-col flex-1 min-h-0 overflow-hidden">
                <div class="grid grid-cols-5 gap-0 border-b border-slate-700/80 w-full shrink-0 min-w-0 pr-1">
                    <button id="tab-btn-transcript" class="py-1 sm:py-1.5 px-0.5 font-bold text-sky-400 border-b-2 border-sky-400 tracking-tight flex flex-col items-center justify-center gap-0 min-w-0 min-h-[2rem] sm:min-h-[2.25rem] active:scale-[0.98] transition-transform overflow-hidden">
                        <span class="text-[10px] sm:text-xs leading-none">🎙️</span>
                        <span class="text-[10px] sm:text-xs whitespace-nowrap leading-tight">ログ</span>
                    </button>
                    <button id="tab-btn-chat" class="py-1 sm:py-1.5 px-0.5 font-bold text-slate-400 hover:text-slate-100/90 tracking-tight transition-colors flex flex-col items-center justify-center gap-0 min-w-0 min-h-[2rem] sm:min-h-[2.25rem] active:scale-[0.98] transition-transform overflow-hidden">
                        <span class="text-[10px] sm:text-xs leading-none">💬</span>
                        <span class="text-[10px] sm:text-xs whitespace-nowrap leading-tight">AI回答</span>
                    </button>
                    <button id="tab-btn-summary" class="py-1 sm:py-1.5 px-0.5 font-bold text-slate-400 hover:text-slate-100/90 tracking-tight transition-colors flex flex-col items-center justify-center gap-0 min-w-0 min-h-[2rem] sm:min-h-[2.25rem] active:scale-[0.98] transition-transform overflow-hidden">
                        <span class="text-[10px] sm:text-xs leading-none">📄</span>
                        <span class="text-[10px] sm:text-xs whitespace-nowrap leading-tight">要約</span>
                    </button>
                    <button id="copy-btn" class="py-1 sm:py-1.5 px-0.5 font-semibold text-slate-100 bg-slate-900/80 border border-slate-600 hover:bg-slate-800 hover:text-white transition-all flex flex-col items-center justify-center gap-0 min-w-0 min-h-[2rem] sm:min-h-[2.25rem] active:scale-[0.98] shadow-sm shadow-slate-900/40 rounded-lg overflow-hidden">
                        <span class="text-[10px] sm:text-xs leading-none">📋</span>
                        <span id="copy-text" class="text-[10px] sm:text-xs whitespace-nowrap leading-tight">コピー</span>
                    </button>
                    <button id="clear-btn" class="py-1 sm:py-1.5 px-0.5 font-semibold text-rose-300 bg-slate-900/80 border border-rose-500/40 hover:bg-rose-500/20 hover:text-rose-100 transition-all flex flex-col items-center justify-center gap-0 min-w-0 min-h-[2rem] sm:min-h-[2.25rem] active:scale-[0.98] shadow-sm shadow-rose-900/40 rounded-lg overflow-hidden">
                        <span class="text-[10px] sm:text-xs leading-none">🗑️</span>
                        <span id="clear-text" class="text-[10px] sm:text-xs whitespace-nowrap leading-tight">クリア</span>
                    </button>
                </div>

                <div id="log-display" class="log-container rounded-b-xl sm:rounded-b-2xl px-3 sm:px-4 pb-3 sm:pb-4 pt-2 sm:pt-3 flex-1 min-h-0 overflow-y-auto relative text-base leading-relaxed">
                    <div id="content-transcript" class="tab-content active">
                        <div id="transcript-area" class="space-y-3"></div>
                        <div id="interim-text-area" class="text-slate-500 italic mt-2"></div>
                    </div>
                    <div id="content-chat" class="tab-content">
                        <div id="chat-area"></div>
                    </div>
                    <div id="content-summary" class="tab-content">
                        <div id="summary-area"></div>
                    </div>
                </div>
            </div>

            <!-- カメラ / チャット入力 カード -->
            <div class="bg-slate-900/75 border border-slate-800 rounded-2xl shadow-[0_18px_55px_rgba(15,23,42,0.96)] backdrop-blur px-3 sm:px-4 py-2 sm:py-3 flex flex-col gap-2 shrink-0">
                <div id="image-preview-container" class="hidden relative inline-block w-20 h-20 sm:w-24 sm:h-24 ml-1 sm:ml-2 mt-1">
                    <img id="image-preview" class="w-full h-full object-cover rounded-xl border border-slate-600 shadow-lg shadow-slate-900/70">
                    <button id="remove-image-btn" class="absolute -top-2 -right-2 bg-rose-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs shadow-lg hover:bg-rose-400">×</button>
                </div>
                <div class="flex gap-2.5 sm:gap-3 w-full items-end">
                    <label for="image-upload" class="cursor-pointer bg-slate-800/90 hover:bg-slate-700/90 px-3.5 py-3 sm:px-4 sm:py-3 rounded-2xl flex items-center justify-center transition-all shadow-lg shadow-slate-900/70 hover:shadow-sky-500/40 text-xl sm:text-2xl mb-1 shrink-0 border border-slate-600/80" title="画像を添付">
                        📸
                    </label>
                    <input type="file" id="image-upload" accept="image/*;capture=camera" class="hidden">
                    <textarea id="chat-input" rows="2" placeholder="質問を入力、または画像をペースト・添付..." class="flex-grow bg-slate-950/80 border border-slate-700 rounded-2xl px-3.5 py-3 text-slate-100 focus:ring-1 focus:ring-sky-500 outline-none resize-y shadow-inner shadow-black/60 max-h-40 overflow-y-auto"></textarea>
                    <button id="send-btn" class="bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-400 hover:to-indigo-400 px-4 py-3 sm:px-5 sm:py-3 rounded-2xl font-bold text-xs sm:text-sm text-slate-50 tracking-wide shadow-lg shadow-sky-900/60 hover:shadow-sky-500/60 transition-all active:scale-95 mb-1 shrink-0 hover:-translate-y-[1px]">
                        送信
                    </button>
                </div>
            </div>

            <!-- アクションボタン / レポート カード -->
            <div class="bg-slate-900/80 border border-slate-800 rounded-xl shadow-[0_14px_44px_rgba(15,23,42,0.94)] backdrop-blur px-2 sm:px-3 py-1 sm:py-1.5 shrink-0">
                <div class="grid grid-cols-3 gap-1 sm:gap-1.5">
                    <button id="toggle-btn" class="bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 py-1 sm:py-1.5 rounded-lg font-bold transition-all active:scale-95 text-[10px] sm:text-xs flex flex-col items-center justify-center gap-0 leading-tight text-slate-950 shadow-md shadow-emerald-900/50 hover:shadow-emerald-400/50">
                        <span class="text-xs sm:text-sm leading-none">🎙️</span>
                        <span class="leading-tight">録音開始</span>
                    </button>
                    <button id="advice-btn" class="bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 py-1 sm:py-1.5 rounded-lg font-bold transition-all active:scale-95 text-[10px] sm:text-xs flex flex-col items-center justify-center gap-0 leading-tight text-slate-950 shadow-md shadow-amber-900/50 hover:shadow-amber-400/50">
                        <span class="text-xs sm:text-sm leading-none">💡</span>
                        <span class="leading-tight">ヒアリング確認</span>
                    </button>
                    <button id="summarize-btn" class="bg-gradient-to-r from-indigo-500 to-violet-500 hover:from-indigo-400 hover:to-violet-400 py-1 sm:py-1.5 rounded-lg font-bold transition-all active:scale-95 text-[10px] sm:text-xs flex flex-col items-center justify-center gap-0 leading-tight text-slate-50 shadow-md shadow-indigo-900/50 hover:shadow-indigo-400/50">
                        <span class="text-xs sm:text-sm leading-none">📄</span>
                        <span class="leading-tight">要約作成</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 履歴パネル -->
    <div id="history-overlay" class="hidden fixed inset-0 bg-black/60 z-40 backdrop-blur-sm" onclick="closeHistoryPanel()"></div>
    <div id="history-panel" class="hidden fixed top-0 right-0 w-full sm:w-96 h-full bg-slate-900 border-l border-slate-700/80 z-50 flex flex-col shadow-2xl overflow-hidden">
        <div class="flex items-center justify-between px-4 py-3 border-b border-slate-700 shrink-0">
            <h2 class="font-bold text-sky-400 text-sm">📂 セッション履歴</h2>
            <button onclick="closeHistoryPanel()" class="text-slate-400 hover:text-white text-xl leading-none w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-800 transition-all">×</button>
        </div>
        <div class="flex-1 overflow-y-auto p-3 log-container">
            <div id="session-list-view">
                <p class="text-xs text-slate-500 mb-3">過去の通話セッションを確認・復元できます（最大20件）</p>
                <div id="session-list" class="flex flex-col gap-2"></div>
            </div>
            <div id="session-detail" class="hidden"></div>
        </div>
    </div>

    <script>
        // === 初期設定と状態管理 ===
        let isRecording = false;
        let manualStop = true; 
        let recognition;
        let rawLogText = localStorage.getItem('mamoru_rawLogText') || "";
        let chatHistoryForReport = localStorage.getItem('mamoru_chatHistory') || "";
        let aiChatContext = []; 
        try {
            const savedContext = localStorage.getItem('mamoru_aiContext');
            if (savedContext) aiChatContext = JSON.parse(savedContext);
        } catch(e) {}

        let currentImageData = null; 
        let startDateTime = new Date();
        // ★修正：リロード時に過去の開始時間を復元する処理（対応時間がリセットされないようにするため）
        const savedStartTime = localStorage.getItem('mamoru_startTime');
        if (savedStartTime) {
            startDateTime = new Date(savedStartTime);
        } else {
            localStorage.setItem('mamoru_startTime', startDateTime.toISOString());
        }

        let currentLang = 'ja';
        let lastAutoSelectedText = "";
        /** 疑問文検知用: 直近30秒以内に確定した final テキスト（言い淀みの分割をまたぐ文脈用） */
        let transcriptFinalTimeSegments = [];
        /** トリガーワード方式: 「質問です」〜「以上です」抽出済み位置（rawLogText 先頭からのオフセット） */
        let triggerScanPointer = 0;
        // sentiment 関連は削除（感情スコア表示を完全にオフ）

        const errorBanner = document.getElementById('error-banner');
        const errorBannerMessage = document.getElementById('error-banner-message');
        const errorBannerClose = document.getElementById('error-banner-close');
        let errorBannerAutoHideTimer = null;

        function hideErrorBanner() {
            if (errorBannerAutoHideTimer) {
                clearTimeout(errorBannerAutoHideTimer);
                errorBannerAutoHideTimer = null;
            }
            if (errorBanner) errorBanner.classList.add('hidden');
        }

        function showError(message) {
            if (!errorBanner || !errorBannerMessage) return;
            if (errorBannerAutoHideTimer) {
                clearTimeout(errorBannerAutoHideTimer);
                errorBannerAutoHideTimer = null;
            }
            errorBannerMessage.textContent = message;
            errorBanner.classList.remove('hidden');
            errorBannerAutoHideTimer = setTimeout(() => {
                errorBannerAutoHideTimer = null;
                if (errorBanner) errorBanner.classList.add('hidden');
            }, 3000);
        }

        if (errorBannerClose) {
            errorBannerClose.onclick = () => hideErrorBanner();
        }

        // === 言語とUIテキスト ===
        const i18n = {
            ja: {
                title: "🛡️ まもるくん", tabTranscript: "🎙️ ログ", tabChat: "💬 AI回答", tabSummary: "📄 要約",
                tabTranscriptLabel: "ログ", tabChatLabel: "AI回答", tabSummaryLabel: "要約",
                placeholder: "質問を入力、または画像をペースト・添付...", btnSend: "送信", btnStart: "録音開始",
                btnStop: "録音停止", btnAdvice: "ヒアリング確認", btnSummarize: "要約作成",
                btnCopy: "コピー", btnClear: "クリア", msgCopied: "コピー完了！",
                statusReport1: "要約作成中(1/2)...", statusReport2: "文章修正中(2/2)...",
                labelYou: "あなた", labelAI: "AI", labelSummary: "生成要約", msgImageAttached: "[📷 画像添付]",
                noChatHistory: "AIとのやり取りはありません。",
                autoQuestionTitle: "疑問文を検知しました",
                autoQuestionHint: "送信するかキャンセルを押してください",
                autoQuestionApprove: "送信する",
                autoQuestionCancel: "キャンセル"
            },
            en: {
                title: "🛡️ MAMORU-KUN", tabTranscript: "🎙️ Log", tabChat: "💬 AI", tabSummary: "📄 Summary",
                tabTranscriptLabel: "Log", tabChatLabel: "AI", tabSummaryLabel: "Summary",
                placeholder: "Type a question or paste/attach an image...", btnSend: "Send", btnStart: "Record",
                btnStop: "Stop", btnAdvice: "Hearing Check", btnSummarize: "Create Summary",
                btnCopy: "Copy", btnClear: "Clear", msgCopied: "Copied!",
                statusReport1: "Creating Summary (1/2)...", statusReport2: "Cleaning text (2/2)...",
                labelYou: "You", labelAI: "AI", labelSummary: "Generated Summary", msgImageAttached: "[📷 Image]",
                noChatHistory: "No AI interactions.",
                autoQuestionTitle: "Detected a question",
                autoQuestionHint: "Tap to send or cancel",
                autoQuestionApprove: "Send",
                autoQuestionCancel: "Cancel"
            }
        };

        // === プロンプト設定 ===
        const aiPrompts = {
    ja: {
        chatContext: (date, log, q) => `音声認識による文字起こしのため、固有名詞や人名が誤変換されている場合があります。文脈から正しく解釈して回答してください。\n\n【絶対厳守】「〜という質問ですね」「〜ということですね」などと質問を繰り返すことは禁止。必ず即座に回答内容から始めること。\n\nあなたはアシスタントです。現在日時: ${date}。\nログを前提に回答してください。\n【超重要】「確認します」等の相槌はせず、すぐに回答を出してください。必ず日本語で回答してください。\n\nログ:\n${log}\n\n質問:${q}`,
        chatDirect: (q) => `音声認識による文字起こしのため、固有名詞や人名が誤変換されている場合があります。文脈から正しく解釈して回答してください。\n\n【絶対厳守】「〜という質問ですね」「〜ということですね」などと質問を繰り返すことは禁止。必ず即座に回答内容から始めること。\n\n【超重要】「確認します」等の相槌はせず、すぐに回答を出してください。必ず日本語で回答してください。\n\n質問: ${q}`,
                imageOnly: "添付した画像について分析・回答してください。(日本語で)",
                advice: (log) => `以下の応対ログを確認し、オペレーターとして「今この時点でヒアリングが漏れていること」や「次に顧客に確認・提案すべきこと」を1〜2点、簡潔に箇条書きで教えてください。\n\nログ:\n${log}`,
                exportReport: (timeText, log, chat) => `以下の応対ログとAIチャット履歴から、日本語で真の要約を作成してください。

【最重要・情報の網羅性と要約方針】
・全体は、要点を絞った簡潔で読みやすい「真の要約」にしてください。ダラダラと長文を書かないこと。
・ただし、ユーザー／顧客が発言した【具体的な固有名詞（地名、施設名、薬の名前、システム名など）】や【具体的な要望事項】のキーワードだけは、絶対に抽出して要約内に残してください。
・長文をそのまま残すのではなく、短い文章や箇条書きの中にこれらの重要キーワードが自然に組み込まれている状態が理想です。
・全文の書き起こしは不要です。詳細な全文は別項目（全文記録）に任せ、ここでは「後から読んだ担当者が要点と重要キーワードをすぐ把握できる要約」にしてください。

【必須構成】
対応時間: ${timeText}

1. 応対概要（上記の方針に従い、簡潔な要約としつつ、重要な固有名詞と要望のキーワードは必ず含める）
2. 決定事項
3. ToDo（アクションアイテム。顧客の要望・依頼内容は具体的な表現のまま列挙すること）
4. 💡AIディレクション（ログから推測される「ヒアリング漏れ」「次に確認すべきトラブルシューティング」を指摘）

ログ:\n${log}\n\nチャット:\n${chat}`,
                exportClean: (log) => `以下の文章を自然な日本語に修正してください。\n【厳守事項】修正後の文章のみを出力すること。「了解しました」などの前置きや後書きは一切出力しない。\n\n${log}`,
                reportTemplate: (report, clean, chat) => `■■ 応対要約記録 ■■\n\n${report}\n\n--- 修正済み全文記録 ---\n${clean}\n\n--- AIチャット履歴 ---\n${chat}`
            },
            en: {
                chatContext: (date, log, q) => `Note: The transcript may contain speech recognition errors, especially for proper nouns. Please interpret from context.\n\n*ABSOLUTE RULE* Never open by restating or echoing the question (e.g. "So you're asking..." / "I understand you want to know..."). Start immediately with the substantive answer.\n\nYou are an assistant. Time: ${date}.\nUse the transcript for context.\n*IMPORTANT* Do NOT say "Let me check". Provide the answer immediately.\n\nTranscript:\n${log}\n\nQuestion:${q}`,
                chatDirect: (q) => `Note: The transcript may contain speech recognition errors, especially for proper nouns. Please interpret from context.\n\n*ABSOLUTE RULE* Never open by restating or echoing the question (e.g. "So you're asking..." / "I understand you want to know..."). Start immediately with the substantive answer.\n\n*IMPORTANT* Do NOT say "Let me check". Provide the answer immediately.\n\nQuestion: ${q}`,
                imageOnly: "Please analyze the attached image in English.",
                advice: (log) => `Review the following log and briefly point out 1-2 missing questions or next steps for the operator.\n\nLog:\n${log}`,
                exportReport: (timeText, log, chat) => `Create a summary in English based on the following.

【CRITICAL - Information completeness】
Do NOT omit or paraphrase any concrete details the customer stated: place names, facility names, proper nouns (e.g. drug names), or specific requests (e.g. preference for online consultation, preferred dates/times). Write them verbatim in "Summary" and "ToDo".
Prioritize "a staff reading this log later must not miss a single concrete customer need" over keeping the summary short. Preserve exact wording for proper nouns, numbers, and conditions.

【Required structure】
Time: ${timeText}
1. Summary (include all concrete details from the customer, no omission)
2. Decisions
3. ToDo (list customer requests in their concrete wording)
4. 💡AI Direction (gaps in hearing, next steps to confirm)

Log:\n${log}\n\nChat:\n${chat}`,
                exportClean: (log) => `Correct the following text in natural English. Output ONLY the corrected text.\n\n${log}`,
                reportTemplate: (report, clean, chat) => `■■ Operator Summary ■■\n\n${report}\n\n--- Cleaned Transcript ---\n${clean}\n\n--- AI Chat History ---\n${chat}`
            }
        };

        // === API通信処理（Workers 経由） ===
        async function askAI(contentsArray) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000);
            
            try {
                const res = await fetch('/api/chat', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ 
                        contents: contentsArray 
                    }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const data = await res.json();
                
                if (!res.ok || data.error) {
                    const errMsg = (currentLang === 'en')
                        ? `API Error: ${data.error ? data.error.message : 'Unknown Error'}`
                        : `APIエラーが発生しました: ${data.error ? data.error.message : '不明なエラー'}`;
                    showError(errMsg);
                    return errMsg;
                }

                if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0].text) {
                    let responseText = data.candidates[0].content.parts[0].text;
                    
                    if (data.candidates[0].groundingMetadata && data.candidates[0].groundingMetadata.groundingChunks) {
                        const chunks = data.candidates[0].groundingMetadata.groundingChunks;
                        let links = [];
                        chunks.forEach(chunk => {
                            if (chunk.web && chunk.web.uri && chunk.web.title) {
                                if (!links.some(l => l.uri === chunk.web.uri)) links.push(chunk.web);
                            }
                        });
                        
                        if (links.length > 0) {
                            responseText += "\n\n**【参考リンク】**\n";
                            links.forEach(link => {
                                responseText += `* [${link.title}](${link.uri})\n`;
                            });
                        }
                    }
                    
                    responseText = responseText.replace(/\[([^\]\n]+)\]\(https:\/\/vertexaisearch\.cloud\.google\.com[^\)]+\)/g, "$1");
                    responseText = responseText.replace(/https:\/\/vertexaisearch\.cloud\.google\.com[^\s\)]+/g, "");
                    // 【参考リンク】およびそれに続くURLリストを表示前に削除
                    responseText = responseText.replace(/\s*【参考リンク】[\s\S]*$/g, "").trim();

                    return responseText;
                }
                return (currentLang === 'en') ? "Response from AI was empty." : "AIからの応答が空でした。";
            } catch (err) { 
                clearTimeout(timeoutId);
                let msg;
                if (err.name === 'AbortError') {
                    msg = (currentLang === 'en')
                        ? "Request timeout: no response from AI for over 30 seconds.\nPlease wait a bit and press \"Send\" again to retry."
                        : "通信タイムアウト: 30秒以上応答がありません。\n少し待ってから、もう一度「送信」ボタンを押してリトライしてください。";
                } else {
                    msg = (currentLang === 'en')
                        ? "Network error: " + err.toString()
                        : "通信失敗: " + err.toString();
                }
                showError(msg);
                return msg; 
            }
        }

        const summarizeBtn = document.getElementById('summarize-btn');
        let summarizeBlinkTimer = null;
        const sendBtn = document.getElementById('send-btn');
        const chatInput = document.getElementById('chat-input');
        const toggleBtn = document.getElementById('toggle-btn');
        const langToggle = document.getElementById('lang-toggle');

        function autoSave() {
            localStorage.setItem('mamoru_rawLogText', rawLogText);
            localStorage.setItem('mamoru_chatHistory', chatHistoryForReport);
            localStorage.setItem('mamoru_aiContext', JSON.stringify(aiChatContext));
        }

        function updateUIText() {
            const t = i18n[currentLang];
            document.getElementById('app-title').innerText = t.title;
            document.getElementById('tab-btn-transcript').innerHTML = `<span class="text-[10px] sm:text-xs leading-none">🎙️</span><span class="text-[10px] sm:text-xs whitespace-nowrap leading-tight">${t.tabTranscriptLabel}</span>`;
            document.getElementById('tab-btn-chat').innerHTML = `<span class="text-[10px] sm:text-xs leading-none">💬</span><span class="text-[10px] sm:text-xs whitespace-nowrap leading-tight">${t.tabChatLabel}</span>`;
            document.getElementById('tab-btn-summary').innerHTML = `<span class="text-[10px] sm:text-xs leading-none">📄</span><span class="text-[10px] sm:text-xs whitespace-nowrap leading-tight">${t.tabSummaryLabel}</span>`;
            chatInput.placeholder = t.placeholder;
            sendBtn.innerText = t.btnSend;
            
            if (isRecording) {
                toggleBtn.className = "bg-gradient-to-r from-rose-500 to-rose-600 hover:from-rose-400 hover:to-rose-500 py-1 sm:py-1.5 rounded-lg font-bold transition-all active:scale-95 text-[10px] sm:text-xs flex flex-col items-center justify-center gap-0 leading-tight text-slate-50 animate-pulse shadow-md shadow-rose-900/50";
                toggleBtn.innerHTML = `<span class="text-xs sm:text-sm leading-none">⏹️</span><span class="leading-tight">${t.btnStop}</span>`;
            } else {
                toggleBtn.className = "bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 py-1 sm:py-1.5 rounded-lg font-bold transition-all active:scale-95 text-[10px] sm:text-xs flex flex-col items-center justify-center gap-0 leading-tight text-slate-950 shadow-md shadow-emerald-900/50 hover:shadow-emerald-400/50";
                toggleBtn.innerHTML = `<span class="text-xs sm:text-sm leading-none">🎙️</span><span class="leading-tight">${t.btnStart}</span>`;
            }
            
            document.getElementById('advice-btn').innerHTML = `<span class="text-xs sm:text-sm leading-none">💡</span><span class="leading-tight">${t.btnAdvice}</span>`;
            summarizeBtn.innerHTML = `<span class="text-xs sm:text-sm leading-none">📄</span><span class="leading-tight">${t.btnSummarize}</span>`;
            document.getElementById('copy-text').innerText = t.btnCopy;
            document.getElementById('clear-text').innerText = t.btnClear;
        }

        langToggle.onchange = (e) => { currentLang = e.target.value; updateUIText(); if(recognition) recognition.lang = (currentLang==='ja')?'ja-JP':'en-US'; };

        // === 疑問文の半自動AI送信（通知→承認・最大5件スタック） ===
        /** 疑問文のみのフィンガープリントで120秒抑制（文脈の変化は無関係） */
        const QUESTION_SUPPRESS_MS = 120000;
        const MAX_AUTO_QUESTION_TOASTS = 5;

        const autoQuestionToastStackEl = document.getElementById('auto-question-toast-stack');
        /** @type {{ el: HTMLElement, fpQuestion: string }[]} */
        let autoQuestionToastStack = [];
        /** 疑問文fp → この時刻まで再表示しない（送信・キャンセルで更新） */
        let questionSuppressUntil = {};

        function removeAutoQuestionToastEntry(el) {
            const idx = autoQuestionToastStack.findIndex(t => t.el === el);
            if (idx >= 0) autoQuestionToastStack.splice(idx, 1);
            if (el && el.parentNode) el.remove();
        }

        /** 録音停止時: 残っている疑問トーストをすべて削除 */
        function clearAllAutoQuestionToasts() {
            while (autoQuestionToastStack.length) {
                const entry = autoQuestionToastStack.shift();
                if (entry && entry.el && entry.el.parentNode) entry.el.remove();
            }
        }

        function normalizeFingerprint(s) {
            return (s || '').replace(/\s+/g, ' ').trim();
        }

        /** 重複判定・抑制は疑問文（検知した一文）のみ。文脈付きcomposedは比較に使わない */
        function fingerprintQuestionOnly(questionSentence) {
            return normalizeFingerprint(questionSentence);
        }

        function isQuestionSuppressed(fpQuestion) {
            const until = questionSuppressUntil[fpQuestion];
            if (until == null) return false;
            if (Date.now() < until) return true;
            delete questionSuppressUntil[fpQuestion];
            return false;
        }

        function suppressQuestionForMs(fpQuestion, ms) {
            questionSuppressUntil[fpQuestion] = Date.now() + ms;
        }

        /** 疑問検知後に送る本文: 直近30秒の確定文から「今の1件より前」だけをつなぎ、その末尾300文字を文脈として質問と結合 */
        function buildComposedQuestionWithContext(latest) {
            const q = (latest || '').trim();
            if (!q) return '';
            const segs = transcriptFinalTimeSegments;
            let contextSource = '';
            if (segs.length > 1) {
                contextSource = segs.slice(0, -1).map(s => s.text).join('\n');
            } else {
                const rt = (rawLogText || '').replace(/\n+$/, '');
                const idx = rt.lastIndexOf('\n');
                contextSource = idx >= 0 ? rt.slice(0, idx) : '';
            }
            const context300 = contextSource.slice(-300).trim();
            const ctxLabel = currentLang === 'en'
                ? 'Context (last ~30s of speech, last 300 chars):'
                : '【直前の文脈（直近30秒・末尾300文字相当）】';
            const qLabel = currentLang === 'en' ? 'Question:' : '【質問】';
            if (!context300) return q;
            return `${ctxLabel}\n${context300}\n\n${qLabel}\n${q}`;
        }

        async function sendChatQuestionText(q) {
            const question = (q || '').trim();
            if (!question) return;
            if (sendBtn.disabled) return;

            const t = i18n[currentLang];
            const p = aiPrompts[currentLang];

            switchTab('chat', { scrollToBottom: true });
            sendBtn.disabled = true;
            const originalSendText = sendBtn.innerText;
            sendBtn.innerText = currentLang === 'en' ? "Thinking..." : "⏳思考中...";

            appendMsg('chat-area', t.labelYou, question, "user-message");

            let currentParts = [];
            if (aiChatContext.length === 0) {
                currentParts.push({ text: p.chatContext(new Date().toLocaleString('ja-JP'), rawLogText, question) });
            } else {
                currentParts.push({ text: p.chatDirect(question) });
            }

            aiChatContext.push({ role: "user", parts: currentParts });
            const res = await askAI(aiChatContext.slice(-10));
            appendMsg('chat-area', t.labelAI, res, "ai-message");
            aiChatContext.push({ role: "model", parts: [{ text: res }] });
            chatHistoryForReport += `${t.labelYou}: ${question}\n${t.labelAI}: ${res}\n\n`;
            autoSave();

            sendBtn.innerText = originalSendText;
            sendBtn.disabled = false;
        }

        /** displayText: トースト表示は質問文のみ。sendPayload: Gemini 送信本文（文脈付き・重複判定には使わない） */
        function showAutoQuestionToast(displayText, sendPayload) {
            console.log('[DEBUG] showAutoQuestionToast called, display:', displayText);
            if (!autoQuestionToastStackEl) return;

            const fpQuestion = fingerprintQuestionOnly(displayText);
            if (autoQuestionToastStack.some(entry => entry.fpQuestion === fpQuestion)) return;

            while (autoQuestionToastStack.length >= MAX_AUTO_QUESTION_TOASTS) {
                const oldest = autoQuestionToastStack.shift();
                if (oldest && oldest.el.parentNode) oldest.el.remove();
            }

            const t = i18n[currentLang];
            const card = document.createElement('div');
            card.className = 'pointer-events-auto bg-slate-900/95 border border-slate-700/80 rounded-2xl shadow-[0_18px_55px_rgba(15,23,42,0.95)] backdrop-blur px-3 py-2 flex items-start gap-2 w-full';

            const icon = document.createElement('div');
            icon.className = 'text-sky-400 text-lg leading-none mt-0.5 shrink-0';
            icon.textContent = '❓';

            const mid = document.createElement('div');
            mid.className = 'flex-1 min-w-0';
            const qEl = document.createElement('div');
            qEl.className = 'text-[11px] sm:text-xs text-slate-200 whitespace-pre-wrap break-words';
            qEl.textContent = displayText;
            mid.appendChild(qEl);

            const btnCol = document.createElement('div');
            btnCol.className = 'flex flex-col gap-1.5 shrink-0';
            const approveBtn = document.createElement('button');
            approveBtn.type = 'button';
            approveBtn.className = 'bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 px-2.5 py-1.5 rounded-xl font-bold text-[10px] sm:text-xs text-slate-950 transition-all active:scale-95 shadow-lg shadow-emerald-900/60';
            approveBtn.textContent = t.autoQuestionApprove;
            const cancelBtn = document.createElement('button');
            cancelBtn.type = 'button';
            cancelBtn.className = 'text-[10px] sm:text-xs text-slate-400 hover:text-white px-2 py-1 rounded-lg border border-slate-700/60 hover:border-sky-500/40 transition-all';
            cancelBtn.textContent = t.autoQuestionCancel;

            approveBtn.disabled = !!sendBtn.disabled;
            approveBtn.onclick = async () => {
                suppressQuestionForMs(fpQuestion, QUESTION_SUPPRESS_MS);
                removeAutoQuestionToastEntry(card);
                await sendChatQuestionText(sendPayload);
            };
            cancelBtn.onclick = () => {
                suppressQuestionForMs(fpQuestion, QUESTION_SUPPRESS_MS);
                removeAutoQuestionToastEntry(card);
            };

            btnCol.appendChild(approveBtn);
            btnCol.appendChild(cancelBtn);
            card.appendChild(icon);
            card.appendChild(mid);
            card.appendChild(btnCol);

            autoQuestionToastStackEl.appendChild(card);
            autoQuestionToastStack.push({ el: card, fpQuestion });
        }

        /**
         * トリガーワード方式: 開始「質問です|しつもんです」→ 終了「以上です|いじょうです」の間を1質問として抽出。
         * トリガー文言は含めない。語尾パターン（ですか等）による自動検知は行わない。
         */
        function maybeCheckTriggerKeywordQuestions() {
            if (!isRecording) return;
            if (!autoQuestionToastStackEl) return;
            const text = rawLogText;
            let from = triggerScanPointer;
            while (from < text.length) {
                const sub = text.slice(from);
                const mStart = sub.match(/(質問です|しつもんです)/);
                if (!mStart) return;
                const contentStart = from + mStart.index + mStart[0].length;
                const afterStart = text.slice(contentStart);
                const mEnd = afterStart.match(/(以上です|いじょうです)/);
                if (!mEnd) return;
                const body = text.slice(contentStart, contentStart + mEnd.index).trim();
                const nextPointer = contentStart + mEnd.index + mEnd[0].length;
                triggerScanPointer = nextPointer;
                from = nextPointer;
                if (!body) continue;
                const fpQuestion = fingerprintQuestionOnly(body);
                if (isQuestionSuppressed(fpQuestion)) continue;
                const composed = buildComposedQuestionWithContext(body);
                console.log('[DEBUG] triggerKeywordQuestion body:', body);
                clearAllAutoQuestionToasts();
                showAutoQuestionToast(body, composed);
                return;
            }
        }

        // === 音声認識処理 ===
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'ja-JP';
            recognition.onresult = (e) => {
                let interim = '', final = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                document.getElementById('interim-text-area').innerText = interim;
                if (interim || final) autoScroll(false);
                if (final) {
                    rawLogText += final + "\n";
                    const p = document.createElement('p');
                    p.className = "pl-3 sm:pl-4 border-l-2 border-slate-700 py-1";
                    p.textContent = final;
                    document.getElementById('transcript-area').appendChild(p);
                    autoScroll(false); autoSave();
                    const nowTs = Date.now();
                    transcriptFinalTimeSegments.push({ t: nowTs, text: final });
                    transcriptFinalTimeSegments = transcriptFinalTimeSegments.filter(s => nowTs - s.t <= 30000);
                    console.log('[DEBUG] final:', final);
                    maybeCheckTriggerKeywordQuestions();
                }
            };
            recognition.onend = () => { if (!manualStop && isRecording) recognition.start(); };
            recognition.onerror = (e) => {
                const msg = (currentLang === 'en')
                    ? `Speech recognition error: ${e.error || 'unknown error'}`
                    : `音声認識エラーが発生しました: ${e.error || '不明なエラー'}`;
                showError(msg);
            };
        }

        let wakeLock = null;
        const requestWakeLock = async () => { 
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} 
        };
        const releaseWakeLock = () => { 
            if (wakeLock !== null) wakeLock.release().then(() => { wakeLock = null; }); 
        };

        toggleBtn.onclick = () => {
            if (!isRecording) { manualStop = false; recognition.start(); isRecording = true; requestWakeLock(); }
            else { manualStop = true; recognition.stop(); isRecording = false; releaseWakeLock(); clearAllAutoQuestionToasts(); triggerScanPointer = rawLogText.length; }
            updateUIText();
        };

        // === 画像アップロード ===
        function handleImageUpload(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scaleSize = 800 / img.width;
                    canvas.width = 800; canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('image-preview').src = dataUrl;
                    document.getElementById('image-preview-container').classList.remove('hidden');
                    currentImageData = { mimeType: 'image/jpeg', data: dataUrl.split(',')[1] };
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('image-upload').onchange = (e) => handleImageUpload(e.target.files[0]);
        chatInput.onpaste = (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i in items) if (items[i].kind === 'file') handleImageUpload(items[i].getAsFile());
        };
        document.getElementById('remove-image-btn').onclick = () => { currentImageData = null; document.getElementById('image-preview-container').classList.add('hidden'); document.getElementById('image-upload').value = ''; };

        // === チャット送信処理 ===
        const sendQuestion = async () => {
            const q = chatInput.value.trim();
            if (!q && !currentImageData) return;
            const t = i18n[currentLang], p = aiPrompts[currentLang];
            
            switchTab('chat', { scrollToBottom: true }); 
            sendBtn.disabled = true;
            const originalSendText = sendBtn.innerText;
            sendBtn.innerText = "⏳思考中...";

            let displayMsg = q + (currentImageData ? "\n"+t.msgImageAttached : "");
            appendMsg('chat-area', t.labelYou, displayMsg, "user-message");
            
            chatInput.value = '';
            lastAutoSelectedText = '';
            window.getSelection().removeAllRanges();

            let currentParts = [];
            if (aiChatContext.length === 0) {
                currentParts.push({ text: p.chatContext(new Date().toLocaleString('ja-JP'), rawLogText, q) });
            } else {
                currentParts.push({ text: q ? p.chatDirect(q) : p.imageOnly });
            }

            if (currentImageData) { 
                currentParts.push({ inlineData: { mimeType: currentImageData.mimeType, data: currentImageData.data } }); 
                document.getElementById('remove-image-btn').click(); 
            }

            aiChatContext.push({ role: "user", parts: currentParts });
            const res = await askAI(aiChatContext.slice(-10));
            appendMsg('chat-area', t.labelAI, res, "ai-message");
            aiChatContext.push({ role: "model", parts: [{ text: res }] });
            chatHistoryForReport += `${t.labelYou}: ${displayMsg}\n${t.labelAI}: ${res}\n\n`;
            autoSave(); 
            
            sendBtn.innerText = originalSendText;
            sendBtn.disabled = false;
        };

        sendBtn.onclick = sendQuestion;
        chatInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendQuestion(); } };

        // === 💡AIアドバイス機能 ===
        document.getElementById('advice-btn').onclick = async () => {
            if (!rawLogText) {
                alert("まだログがありません。少し録音してからお試しください。");
                return;
            }
            const t = i18n[currentLang], p = aiPrompts[currentLang];
            switchTab('chat', { scrollToBottom: true });
            
            const btn = document.getElementById('advice-btn');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="text-sm">⏳</span><span>思考中</span>`;
            
            let displayMsg = "現在の状況から、ヒアリング漏れや次に確認すべきことを教えてください。";
            appendMsg('chat-area', t.labelYou, displayMsg, "user-message");
            
            const res = await askAI([{ role: "user", parts: [{ text: p.advice(rawLogText) }] }]);
            appendMsg('chat-area', t.labelAI, res, "ai-message");
            
            chatHistoryForReport += `${t.labelYou}: ${displayMsg}\n${t.labelAI}: ${res}\n\n`;
            autoSave();
            
            btn.innerHTML = originalHTML;
            btn.disabled = false;
        };

        // === 要約作成処理 ===
        summarizeBtn.onclick = async () => {
            if (!rawLogText) return;
            const endDateTime = new Date();
            
            const diffMs = endDateTime - startDateTime;
            const diffMins = Math.floor(diffMs / 60000);
            const timeText = `${startDateTime.toLocaleString('ja-JP')} 〜 ${endDateTime.toLocaleString('ja-JP')} (${diffMins}分間)`;
            
            const t = i18n[currentLang];
            const p = aiPrompts[currentLang];
            
            switchTab('summary'); 
            const originalHTML = summarizeBtn.innerHTML;
            summarizeBtn.disabled = true;
            
            // 手動点滅アニメーション（opacity を往復させる）
            let dimmed = false;
            summarizeBtn.style.transition = 'opacity 0.4s ease-in-out';
            summarizeBtn.style.opacity = '0.6';
            summarizeBlinkTimer = setInterval(() => {
                dimmed = !dimmed;
                summarizeBtn.style.opacity = dimmed ? '0.6' : '1';
            }, 1000);

            try {
                summarizeBtn.innerHTML = `<span class="text-sm">⏳</span><span>${t.statusReport1}</span>`;
                const finalReport = await askAI([{ role: "user", parts: [{ text: p.exportReport(timeText, rawLogText, chatHistoryForReport) }] }]);
                
                summarizeBtn.innerHTML = `<span class="text-sm">⏳</span><span>${t.statusReport2}</span>`;
                const cleanLog = await askAI([{ role: "user", parts: [{ text: p.exportClean(rawLogText) }] }]);
                
                const fullContent = p.reportTemplate(finalReport, cleanLog, chatHistoryForReport || t.noChatHistory);
                
                document.getElementById('summary-area').innerHTML = "";
                appendMsg('summary-area', t.labelSummary, fullContent, "ai-message");
            } finally {
                if (summarizeBlinkTimer) {
                    clearInterval(summarizeBlinkTimer);
                    summarizeBlinkTimer = null;
                }
                summarizeBtn.style.opacity = '1';
                summarizeBtn.innerHTML = originalHTML;
                summarizeBtn.disabled = false;
            }
        };

        // === コピー機能 ===
        document.getElementById('copy-btn').onclick = async () => {
            const activeTabId = document.querySelector('.tab-content.active').id;
            let text = "";
            if (activeTabId === 'content-transcript') text = rawLogText;
            else if (activeTabId === 'content-chat') text = chatHistoryForReport;
            else text = document.getElementById('summary-area').innerText;
            
            try {
                await navigator.clipboard.writeText(text);
                const span = document.getElementById('copy-text'), old = span.innerText;
                span.innerText = i18n[currentLang].msgCopied;
                setTimeout(() => span.innerText = old, 2000);
            } catch (err) {
                alert("テキストを手動で選択してコピーしてください。");
            }
        };

        // === タブ切り替え ===
        function scrollLogDisplayToBottom() {
            const d = document.getElementById('log-display');
            if (!d) return;
            requestAnimationFrame(() => {
                d.scrollTop = d.scrollHeight;
            });
        }

        function switchTab(id, opts = {}) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('content-' + id).classList.add('active');
            document.querySelectorAll('[id^="tab-btn-"]').forEach(b => { 
                b.classList.remove('text-sky-400', 'border-b-2', 'border-sky-400'); 
                b.classList.add('text-slate-500'); 
            });
            document.getElementById('tab-btn-' + id).classList.add('text-sky-400', 'border-b-2', 'border-sky-400');
            const logDisplay = document.getElementById('log-display');
            if (opts.scrollToBottom) {
                scrollLogDisplayToBottom();
            } else {
                logDisplay.scrollTop = 0;
            }
        }
        document.getElementById('tab-btn-transcript').onclick = () => switchTab('transcript');
        document.getElementById('tab-btn-chat').onclick = () => switchTab('chat');
        document.getElementById('tab-btn-summary').onclick = () => switchTab('summary');

        // === URLリンク化処理 ===
        function formatText(text) {
            let html = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            html = html.replace(/\[([^\]\n]+)\]\((https?:\/\/[^\s\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer" class="text-blue-400 hover:underline break-all">$1</a>');
            html = html.replace(/(?<!href=")(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer" class="text-blue-400 hover:underline break-all">$1</a>');
            html = html.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
            return html;
        }

        function appendMsg(id, label, text, cls) {
            const div = document.createElement('div'); div.className = cls;
            if (cls === 'user-message') { document.querySelectorAll('.latest-q').forEach(e => e.classList.remove('latest-q')); div.classList.add('latest-q'); }
            div.innerHTML = `<div class="text-[10px] opacity-60 font-bold mb-1">${label}</div><div class="whitespace-pre-wrap">${formatText(text)}</div>`;
            document.getElementById(id).appendChild(div);
            if (id === 'transcript-area') autoScroll(true);
            if (id === 'chat-area' && (cls === 'user-message' || cls === 'ai-message')) {
                if (document.getElementById('content-chat').classList.contains('active')) {
                    setTimeout(() => scrollLogDisplayToBottom(), 0);
                }
            }
        }

        function autoScroll(force = false) {
            const d = document.getElementById('log-display');
            if (force || document.getElementById('content-transcript').classList.contains('active')) d.scrollTop = d.scrollHeight;
        }

        // === テキストエリア オートリサイズ（スマホで resize が効かないため） ===
        function resizeChatInput(ta) {
            ta.style.height = 'auto';
            const maxH = 160; // max-h-40 に合わせる (10rem)
            ta.style.height = Math.min(ta.scrollHeight, maxH) + 'px';
        }
        chatInput.addEventListener('input', function() {
            if (chatInput.value !== lastAutoSelectedText) lastAutoSelectedText = "";
            resizeChatInput(this);
        });
        chatInput.addEventListener('paste', () => { lastAutoSelectedText = ""; setTimeout(() => resizeChatInput(chatInput), 0); });

        // === 選択テキストの自動入力 ===
        function handleSelection() {
            if (document.activeElement === chatInput) return;
            setTimeout(() => {
                const sel = window.getSelection().toString().trim();
                if (sel && (chatInput.value === "" || chatInput.value === lastAutoSelectedText)) {
                    chatInput.value = sel; lastAutoSelectedText = sel;
                    resizeChatInput(chatInput);
                }
            }, 200); 
        }
        document.addEventListener('mouseup', handleSelection);
        document.addEventListener('touchend', handleSelection);
        document.addEventListener('selectionchange', handleSelection);

        // === 初期化処理 ===
        window.addEventListener('DOMContentLoaded', () => {
            if (rawLogText) {
                rawLogText.split('\n').forEach(line => {
                    if (line.trim()) {
                        const p = document.createElement('p'); p.className = "pl-3 sm:pl-4 border-l-2 border-slate-700 py-1"; p.textContent = line;
                        document.getElementById('transcript-area').appendChild(p);
                    }
                });
                autoScroll(true);
            }
            if (chatHistoryForReport) {
                const div = document.createElement('div'); div.className = "ai-message opacity-75";
                div.innerHTML = `<div class="text-[10px] font-bold text-rose-400 mb-1">※復元</div><div class="whitespace-pre-wrap">${formatText(chatHistoryForReport)}</div>`;
                document.getElementById('chat-area').appendChild(div);
            }
            updateUIText();
        });
        document.getElementById('clear-btn').onclick = () => {
            if (confirm('記録されているログやチャット履歴をすべて消去して、最初からやり直しますか？\n（現在のセッションは履歴に自動保存されます）')) {
                saveCurrentSession();
                localStorage.removeItem('mamoru_rawLogText'); localStorage.removeItem('mamoru_chatHistory'); localStorage.removeItem('mamoru_aiContext');
                localStorage.removeItem('mamoru_startTime');
                location.reload();
            }
        };
        // ============================================================
        // セッション履歴管理
        // ============================================================
        function getSessions() {
            try { return JSON.parse(localStorage.getItem('mamoru_sessions') || '[]'); } catch(e) { return []; }
        }

        function saveCurrentSession() {
            if (!rawLogText.trim()) return;
            const sessions = getSessions();
            const session = {
                id: Date.now(),
                startTime: startDateTime.toISOString(),
                endTime: new Date().toISOString(),
                rawLogText,
                chatHistory: chatHistoryForReport,
                aiContext: JSON.stringify(aiChatContext),
                summary: document.getElementById('summary-area').innerText || ''
            };
            sessions.unshift(session);
            if (sessions.length > 20) sessions.pop();
            localStorage.setItem('mamoru_sessions', JSON.stringify(sessions));
        }

        function openHistoryPanel() {
            renderSessionList();
            document.getElementById('history-panel').classList.remove('hidden');
            document.getElementById('history-overlay').classList.remove('hidden');
        }

        function closeHistoryPanel() {
            document.getElementById('history-panel').classList.add('hidden');
            document.getElementById('history-overlay').classList.add('hidden');
        }

        function renderSessionList() {
            const sessions = getSessions();
            const list = document.getElementById('session-list');
            document.getElementById('session-detail').classList.add('hidden');
            document.getElementById('session-list-view').classList.remove('hidden');
            if (sessions.length === 0) {
                list.innerHTML = '<p class="text-slate-500 text-sm text-center py-6">保存された履歴はありません</p>';
                return;
            }
            list.innerHTML = sessions.map(s => {
                const start = new Date(s.startTime);
                const end = new Date(s.endTime);
                const diffMins = Math.floor((end - start) / 60000);
                const preview = (s.rawLogText || '').slice(0, 60).replace(/\n/g, ' ');
                return `<div class="bg-slate-800/80 border border-slate-700 rounded-xl p-3 cursor-pointer hover:border-sky-500/60 transition-all active:scale-[0.98]" onclick="viewSession(${s.id})">
                    <div class="flex justify-between items-start gap-2">
                        <div class="flex-1 min-w-0">
                            <div class="text-xs text-sky-400 font-bold mb-0.5">${start.toLocaleDateString('ja-JP')} ${start.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'})}〜 (${diffMins}分)</div>
                            <div class="text-xs text-slate-300 truncate">${preview || '(ログなし)'}</div>
                        </div>
                        <button class="text-slate-500 hover:text-rose-400 text-lg leading-none shrink-0 w-7 h-7 flex items-center justify-center" onclick="event.stopPropagation();if(confirm('この履歴を削除しますか？'))deleteSession(${s.id})">×</button>
                    </div>
                </div>`;
            }).join('');
        }

        function deleteSession(id) {
            const sessions = getSessions().filter(s => s.id !== id);
            localStorage.setItem('mamoru_sessions', JSON.stringify(sessions));
            renderSessionList();
        }

        function viewSession(id) {
            const session = getSessions().find(s => s.id === id);
            if (!session) return;
            const start = new Date(session.startTime);
            const end = new Date(session.endTime);
            const diffMins = Math.floor((end - start) / 60000);
            const timeText = `${start.toLocaleString('ja-JP')} 〜 ${end.toLocaleString('ja-JP')} (${diffMins}分間)`;
            const detail = document.getElementById('session-detail');
            detail.innerHTML = `
                <div class="flex items-center justify-between mb-3">
                    <button onclick="renderSessionList()" class="text-sky-400 hover:text-sky-300 text-xs flex items-center gap-1">← 一覧に戻る</button>
                    <span class="text-xs text-slate-400">${diffMins}分間</span>
                </div>
                <div class="text-xs text-slate-500 mb-3">${timeText}</div>
                <div class="text-xs font-bold text-slate-400 mb-1">ログ:</div>
                <div class="bg-slate-950/60 rounded-lg p-2 mb-3 max-h-36 overflow-y-auto text-xs text-slate-300 whitespace-pre-wrap log-container">${session.rawLogText || '(なし)'}</div>
                ${session.summary ? `<div class="text-xs font-bold text-slate-400 mb-1">要約:</div>
                <div class="bg-slate-950/60 rounded-lg p-2 mb-3 max-h-36 overflow-y-auto text-xs text-slate-300 whitespace-pre-wrap log-container">${session.summary}</div>` : ''}
                <button onclick="restoreSession(${id})" class="w-full bg-gradient-to-r from-sky-600 to-indigo-600 hover:from-sky-500 hover:to-indigo-500 py-2 rounded-xl font-bold text-xs text-slate-50 transition-all active:scale-95">このセッションを復元</button>`;
            document.getElementById('session-list-view').classList.add('hidden');
            detail.classList.remove('hidden');
        }

        function restoreSession(id) {
            const session = getSessions().find(s => s.id === id);
            if (!session) return;
            if (!confirm('現在のセッションを履歴に保存して、このセッションを復元しますか？')) return;
            saveCurrentSession();
            localStorage.setItem('mamoru_rawLogText', session.rawLogText);
            localStorage.setItem('mamoru_chatHistory', session.chatHistory);
            localStorage.setItem('mamoru_aiContext', session.aiContext || '[]');
            localStorage.setItem('mamoru_startTime', session.startTime);
            closeHistoryPanel();
            location.reload();
        }

        document.getElementById('history-btn').onclick = openHistoryPanel;

        // sentiment 関連は削除（感情スコア表示を完全にオフ）
    </script>
</body>
</html>
