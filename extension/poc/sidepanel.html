<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>まもるくん POC v2</title>
  <style>
    body {
      margin: 0; padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: #0f172a; color: #e2e8f0;
    }
    h1 { font-size: 16px; color: #38bdf8; margin: 0 0 12px; }
    #status {
      padding: 8px 12px; border-radius: 8px; margin-bottom: 12px;
      font-size: 12px; font-weight: bold;
    }
    .status-idle  { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .status-active{ background: #052e16; color: #4ade80; border: 1px solid #16a34a; animation: pulse 1.5s ease-in-out infinite; }
    .status-error { background: #450a0a; color: #fca5a5; border: 1px solid #dc2626; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    button {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: bold; cursor: pointer; margin-bottom: 10px;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.7; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #toggle-btn.idle  { background: linear-gradient(135deg, #10b981, #06b6d4); color: #0f172a; }
    #toggle-btn.active{ background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    #interim {
      min-height: 32px; padding: 8px 10px;
      background: #1e293b; border: 1px dashed #475569; border-radius: 8px;
      color: #64748b; font-style: italic; font-size: 13px; margin-bottom: 8px;
    }
    #transcript {
      min-height: 100px; padding: 10px;
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
      font-size: 13px; line-height: 1.6; color: #cbd5e1; margin-bottom: 10px;
      white-space: pre-wrap; word-break: break-all;
    }
    #log {
      min-height: 80px; max-height: 200px; overflow-y: auto;
      padding: 8px 10px; background: #020617;
      border: 1px solid #1e293b; border-radius: 8px;
      font-size: 11px; font-family: monospace; color: #475569;
    }
    .log-ok   { color: #4ade80; }
    .log-err  { color: #f87171; }
    .log-info { color: #94a3b8; }
    #clear-btn { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    label { font-size: 11px; color: #64748b; display: block; margin-bottom: 4px; }
    #notice {
      font-size: 11px; color: #fbbf24; background: #1c1203;
      border: 1px solid #78350f; border-radius: 6px;
      padding: 6px 8px; margin-bottom: 10px; line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>🎙️ Speech API POC v2</h1>

  <div id="notice">⚠️ 録音中はこのサイドパネルを開いているタブを開いたままにしてください。<br>chrome:// ページや新規タブでは動作しません。</div>

  <div id="status" class="status-idle">待機中</div>

  <button id="toggle-btn" class="idle">録音開始</button>

  <label>暫定テキスト（interim）</label>
  <div id="interim">—</div>

  <label>確定テキスト（final）</label>
  <div id="transcript"></div>

  <button id="clear-btn">テキストをクリア</button>

  <label>イベントログ</label>
  <div id="log"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
