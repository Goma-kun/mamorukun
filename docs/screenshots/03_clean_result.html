<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>まもるくん — 清書結果</title>
<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;width:1280px;height:800px;background:#060e1f;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}
.popup{width:380px;height:620px;background:#0f172a;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(56,189,248,0.15);}
#header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(15,23,42,0.9);border-bottom:1px solid #1e293b;flex-shrink:0;}
#app-title{font-size:15px;font-weight:800;color:#38bdf8;text-shadow:0 0 12px rgba(56,189,248,0.35);margin:0;}
.header-btns{display:flex;gap:6px;}
.header-btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;}
#clear-btn{color:#f87171;}
#tab-bar{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #1e293b;flex-shrink:0;}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:#64748b;font-size:12px;font-weight:700;padding:7px 4px;display:flex;flex-direction:column;align-items:center;gap:1px;}
.tab-btn .icon{font-size:13px;line-height:1;}
.tab-btn .label{font-size:10px;line-height:1.2;}
.tab-btn.active{color:#38bdf8;border-bottom-color:#38bdf8;}
#panel-clean{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.clean-copy-row{display:flex;justify-content:flex-end;}
.code-copy-btn{background:rgba(30,41,59,0.85);border:1px solid #334155;border-radius:7px;color:#94a3b8;font-size:12px;font-weight:600;padding:5px 12px;cursor:pointer;}
.clean-card{background:linear-gradient(135deg,rgba(37,99,235,0.15),rgba(91,33,182,0.15));border:1px solid rgba(99,102,241,0.3);border-radius:10px;padding:12px;color:#c7d2fe;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-all;}
#action-bar{flex-shrink:0;padding:8px 10px;border-top:1px solid #1e293b;background:rgba(15,23,42,0.95);display:flex;flex-direction:column;gap:6px;}
#toggle-btn{width:100%;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:0.02em;background:linear-gradient(135deg,#10b981,#06b6d4);color:#0f172a;box-shadow:0 4px 15px rgba(16,185,129,0.3);}
#clean-btn{width:100%;padding:8px;border:1px solid #6366f1;border-radius:8px;background:rgba(99,102,241,0.1);color:#a5b4fc;font-size:12px;font-weight:700;}
</style>
</head>
<body>
<div class="popup">
  <header id="header">
    <h1 id="app-title">🛡️ まもるくん</h1>
    <div class="header-btns">
      <button class="header-btn" id="clear-btn">🗑️</button>
      <button class="header-btn">⚙️</button>
    </div>
  </header>
  <div id="tab-bar">
    <button class="tab-btn"><span class="icon">🎙️</span><span class="label">ログ</span></button>
    <button class="tab-btn active"><span class="icon">✏️</span><span class="label">清書</span></button>
  </div>
  <div id="panel-clean">
    <div class="clean-copy-row">
      <button class="code-copy-btn">📋 コピー</button>
    </div>
    <div class="clean-card">本日はお忙しい中、お時間をいただきありがとうございます。

早速ですが、先日ご共有いただいた資料についていくつか確認させてください。

第三四半期の売上については、当初の予測を上回る結果となりました。特にアジア太平洋地域での伸びが顕著で、前年比で約30%の成長を記録しています。

次の施策として、来月から新しいキャンペーンを展開する予定です。詳細については改めてご連絡いたします。</div>
    <div class="clean-copy-row">
      <button class="code-copy-btn">📋 コピー</button>
    </div>
  </div>
  <div id="action-bar">
    <button id="toggle-btn">▶ 開始</button>
    <button id="clean-btn">✏️ 再清書</button>
  </div>
</div>
</body>
</html>
