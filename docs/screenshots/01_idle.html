<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>まもるくん — メイン画面</title>
<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;width:1280px;height:800px;background:#060e1f;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}
.popup{width:380px;height:620px;background:#0f172a;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(56,189,248,0.15);}
#header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(15,23,42,0.9);border-bottom:1px solid #1e293b;flex-shrink:0;}
#app-title{font-size:15px;font-weight:800;color:#38bdf8;text-shadow:0 0 12px rgba(56,189,248,0.35);margin:0;}
.header-btns{display:flex;gap:6px;}
.header-btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;}
#clear-btn{color:#f87171;}
#tab-bar{display:grid;grid-template-columns:1fr;border-bottom:1px solid #1e293b;flex-shrink:0;}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:#64748b;font-size:12px;font-weight:700;padding:7px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;}
.tab-btn .icon{font-size:13px;line-height:1;}
.tab-btn .label{font-size:10px;line-height:1.2;}
.tab-btn.active{color:#38bdf8;border-bottom-color:#38bdf8;}
#panel-transcript{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;}
.empty-hint{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#334155;text-align:center;}
.empty-hint .big{font-size:36px;opacity:0.5;}
.empty-hint p{font-size:12px;color:#475569;margin:0;line-height:1.6;}
#action-bar{flex-shrink:0;padding:8px 10px;border-top:1px solid #1e293b;background:rgba(15,23,42,0.95);display:flex;flex-direction:column;gap:6px;}
#toggle-btn{width:100%;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:0.02em;background:linear-gradient(135deg,#10b981,#06b6d4);color:#0f172a;box-shadow:0 4px 15px rgba(16,185,129,0.3);}
#clean-btn{width:100%;padding:8px;border:1px solid #6366f1;border-radius:8px;background:rgba(99,102,241,0.1);color:#a5b4fc;font-size:12px;font-weight:700;cursor:pointer;}
.bg-deco{position:fixed;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,0.04),transparent);top:-100px;left:-100px;pointer-events:none;}
</style>
</head>
<body>
<div class="bg-deco"></div>
<div class="popup">
  <header id="header">
    <h1 id="app-title">🛡️ まもるくん</h1>
    <div class="header-btns">
      <button class="header-btn" id="clear-btn">🗑️</button>
      <button class="header-btn">⚙️</button>
    </div>
  </header>
  <div id="tab-bar">
    <button class="tab-btn active"><span class="icon">🎙️</span><span class="label">ログ</span></button>
  </div>
  <div id="panel-transcript">
    <div class="empty-hint">
      <div class="big">🎙️</div>
      <p>「▶ 開始」を押してマイクに向かって話すと<br>リアルタイムで文字起こしが始まります</p>
    </div>
  </div>
  <div id="action-bar">
    <button id="toggle-btn">▶ 開始</button>
    <button id="clean-btn">🔑 APIキーを設定して清書</button>
  </div>
</div>
</body>
</html>
