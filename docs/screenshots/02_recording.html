<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>まもるくん — 録音中</title>
<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;width:1280px;height:800px;background:#060e1f;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}
.popup{width:380px;height:620px;background:#0f172a;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(239,68,68,0.2);}
#header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(15,23,42,0.9);border-bottom:1px solid #1e293b;flex-shrink:0;}
#app-title{font-size:15px;font-weight:800;color:#38bdf8;text-shadow:0 0 12px rgba(56,189,248,0.35);margin:0;}
.header-btns{display:flex;gap:6px;}
.header-btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;}
#clear-btn{color:#f87171;}
#tab-bar{display:grid;grid-template-columns:1fr;border-bottom:1px solid #1e293b;flex-shrink:0;}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:#64748b;font-size:12px;font-weight:700;padding:7px 4px;display:flex;flex-direction:column;align-items:center;gap:1px;}
.tab-btn .icon{font-size:13px;line-height:1;}
.tab-btn .label{font-size:10px;line-height:1.2;}
.tab-btn.active{color:#38bdf8;border-bottom-color:#38bdf8;}
#panel-transcript{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:4px;}
.transcript-line{margin:0;padding:4px 8px;border-left:2px solid #334155;color:#cbd5e1;font-size:13px;line-height:1.6;word-break:break-all;}
.rec-dot{display:inline-block;width:7px;height:7px;background:#ef4444;border-radius:50%;margin-right:6px;animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
#interim-line{padding:4px 8px;margin-top:4px;color:#475569;font-style:italic;font-size:13px;line-height:1.5;word-break:break-all;}
#action-bar{flex-shrink:0;padding:8px 10px;border-top:1px solid #1e293b;background:rgba(15,23,42,0.95);display:flex;flex-direction:column;gap:6px;}
#toggle-btn{width:100%;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:0.02em;background:linear-gradient(135deg,#ef4444,#dc2626);color:white;box-shadow:0 4px 22px rgba(239,68,68,0.6);animation:recpulse 1.5s ease-in-out infinite;}
@keyframes recpulse{0%,100%{box-shadow:0 4px 15px rgba(239,68,68,0.4);}50%{box-shadow:0 4px 22px rgba(239,68,68,0.7);}}
#clean-btn{width:100%;padding:8px;border:1px solid #6366f1;border-radius:8px;background:rgba(99,102,241,0.1);color:#a5b4fc;font-size:12px;font-weight:700;}
</style>
</head>
<body>
<div class="popup">
  <header id="header">
    <h1 id="app-title">🛡️ まもるくん</h1>
    <div class="header-btns">
      <button class="header-btn" id="clear-btn">🗑️</button>
      <button class="header-btn">⚙️</button>
    </div>
  </header>
  <div id="tab-bar">
    <button class="tab-btn active"><span class="icon">🎙️</span><span class="label">ログ</span></button>
  </div>
  <div id="panel-transcript">
    <p class="transcript-line">本日はお忙しい中お時間をいただきありがとうございます。</p>
    <p class="transcript-line">早速ですが、先日ご共有いただいた資料についていくつか確認させてください。</p>
    <p class="transcript-line">第三四半期の売上については、当初の予測を上回る結果となりました。</p>
    <p class="transcript-line">特にアジア太平洋地域での伸びが顕著で、前年比で約三十パーセントの成長を記録しています。</p>
    <div id="interim-line"><span class="rec-dot"></span>次の施策として、えーと、来月から新しいキャンペーンを...</div>
  </div>
  <div id="action-bar">
    <button id="toggle-btn">■ 停止</button>
    <button id="clean-btn">🔑 APIキーを設定して清書</button>
  </div>
</div>
</body>
</html>
