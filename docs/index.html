<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>まもるくん</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #0f172a; color: #e2e8f0;
      font-family: system-ui, -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
      font-size: 15px;
      overflow: hidden;
    }

    /* ── ヘッダー ── */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: rgba(15,23,42,0.95);
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
    }
    #app-title {
      font-size: 17px; font-weight: 800;
      color: #38bdf8;
      text-shadow: 0 0 12px rgba(56,189,248,0.35);
      margin: 0;
    }

    /* ── タブバー ── */
    #tab-bar {
      display: grid; grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
    }
    .tab-btn {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: #64748b; font-size: 13px; font-weight: 700;
      padding: 9px 4px; cursor: pointer; transition: all 0.15s;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .tab-btn .icon { font-size: 15px; line-height: 1; }
    .tab-btn .label { font-size: 11px; line-height: 1.2; }
    .tab-btn.active { color: #38bdf8; border-bottom-color: #38bdf8; }
    .tab-btn:hover:not(.active) { color: #94a3b8; }

    /* ── メインコンテンツ ── */
    #main { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .panel { display: none; flex: 1; min-height: 0; overflow-y: auto; }

    /* ── ログパネル ── */
    #panel-transcript { padding: 14px; }
    #panel-transcript::-webkit-scrollbar { width: 4px; }
    #panel-transcript::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    #transcript-lines { display: flex; flex-direction: column; gap: 6px; min-height: 20px; }
    .transcript-line {
      margin: 0; padding: 5px 10px;
      border-left: 2px solid #334155;
      color: #cbd5e1; font-size: 14px; line-height: 1.7;
      word-break: break-all;
    }
    #interim-line {
      padding: 5px 10px; margin-top: 6px;
      color: #475569; font-style: italic; font-size: 14px;
      line-height: 1.6; word-break: break-all; min-height: 6px;
    }

    /* ── 履歴パネル ── */
    #panel-history { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    #panel-history::-webkit-scrollbar { width: 4px; }
    #panel-history::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    .history-empty {
      color: #475569; font-size: 14px; text-align: center; padding: 40px 16px;
    }
    .history-card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 12px; padding: 12px 14px;
      display: flex; flex-direction: column; gap: 7px;
    }
    .history-meta { color: #64748b; font-size: 12px; font-weight: 700; }
    .history-body {
      color: #cbd5e1; font-size: 13px; line-height: 1.7; word-break: break-all;
      display: -webkit-box; -webkit-line-clamp: 4;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .history-copy-btn {
      align-self: flex-end;
      background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.3);
      border-radius: 8px; color: #38bdf8;
      font-size: 12px; font-weight: 700;
      padding: 6px 14px; cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .history-copy-btn:active { background: rgba(56,189,248,0.25); }

    /* ── アクションバー ── */
    #action-bar {
      flex-shrink: 0;
      padding: 10px 12px;
      border-top: 1px solid #1e293b;
      background: rgba(15,23,42,0.97);
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }
    #toggle-btn {
      width: 100%; padding: 14px;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 800; cursor: pointer;
      transition: all 0.15s; letter-spacing: 0.02em;
      -webkit-tap-highlight-color: transparent;
    }
    #toggle-btn.idle {
      background: linear-gradient(135deg, #10b981, #06b6d4);
      color: #0f172a;
      box-shadow: 0 4px 20px rgba(16,185,129,0.35);
    }
    #toggle-btn.recording {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white; animation: recpulse 1.5s ease-in-out infinite;
      box-shadow: 0 4px 20px rgba(239,68,68,0.45);
    }
    @keyframes recpulse {
      0%,100%{ box-shadow: 0 4px 20px rgba(239,68,68,0.45); }
      50%{ box-shadow: 0 4px 30px rgba(239,68,68,0.75); }
    }

    /* 全体レイアウト */
    #wrapper { height: 100dvh; display: flex; flex-direction: column; }

    /* トースト */
    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      padding: 8px 16px; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      z-index: 9999; pointer-events: none;
      transition: opacity 0.3s; opacity: 0;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <header id="header">
      <h1 id="app-title">🛡️ まもるくん</h1>
    </header>

    <div id="tab-bar">
      <button id="tab-transcript" class="tab-btn active">
        <span class="icon">🎙️</span><span class="label">ログ</span>
      </button>
      <button id="tab-history" class="tab-btn">
        <span class="icon">🕐</span><span class="label">履歴</span>
      </button>
    </div>

    <div id="main">
      <div id="panel-transcript" class="panel" style="display:block;">
        <div id="transcript-lines"></div>
        <div id="interim-line"></div>
      </div>
      <div id="panel-history" class="panel"></div>
    </div>

    <div id="action-bar">
      <button id="toggle-btn" class="idle">▶ 開始</button>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // ============================================================
    // 設定
    // ============================================================
    const GAS_URL    = "https://script.google.com/macros/s/AKfycbzozKf-NO20PtpWfi3hzNMvzQAQ9Uy80b_hJmjfDSA4-JyIAVSIJxWa5plNZRrAi2s/exec";
    const ACCESS_KEY = "Gomao!";

    // ============================================================
    // 状態
    // ============================================================
    let isRecording    = false;
    let recognition    = null;
    let recognitionAlive = false;
    let transcript     = '';
    let history        = [];

    // ============================================================
    // ストレージ（localStorage）
    // ============================================================
    function loadStorage() {
      transcript = localStorage.getItem('mamoru_transcript') || '';
      try { history = JSON.parse(localStorage.getItem('mamoru_history') || '[]'); } catch(e) { history = []; }
    }

    function saveTranscript() {
      localStorage.setItem('mamoru_transcript', transcript);
    }

    function saveHistory() {
      localStorage.setItem('mamoru_history', JSON.stringify(history));
    }

    function addToHistory(t, c) {
      if (!t.trim()) return;
      history.unshift({
        id:         Date.now(),
        date:       new Date().toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
        transcript: t,
        cleaned:    c || '',
      });
      if (history.length > 3) history = history.slice(0, 3);
      saveHistory();
    }

    // ============================================================
    // UI 要素
    // ============================================================
    const tabTranscript   = document.getElementById('tab-transcript');
    const tabHistory      = document.getElementById('tab-history');
    const panelTranscript = document.getElementById('panel-transcript');
    const panelHistory    = document.getElementById('panel-history');
    const transcriptLines = document.getElementById('transcript-lines');
    const interimLine     = document.getElementById('interim-line');
    const toggleBtn       = document.getElementById('toggle-btn');

    // ============================================================
    // パネル切り替え
    // ============================================================
    function switchPanel(id) {
      [tabTranscript, tabHistory].forEach(t => t.classList.remove('active'));
      panelTranscript.style.display = 'none';
      panelHistory.style.display    = 'none';
      if (id === 'transcript') {
        panelTranscript.style.display = 'block';
        tabTranscript.classList.add('active');
      } else {
        panelHistory.style.display = 'block';
        tabHistory.classList.add('active');
        renderHistory();
      }
    }

    // ============================================================
    // ログ表示
    // ============================================================
    function renderTranscript() {
      transcriptLines.innerHTML = '';
      if (!transcript.trim()) return;
      transcript.split('\n').forEach(line => {
        if (!line.trim()) return;
        const p = document.createElement('p');
        p.className = 'transcript-line';
        p.textContent = line;
        transcriptLines.appendChild(p);
      });
      scrollToBottom();
    }

    function appendLine(text) {
      if (!text.trim()) return;
      const p = document.createElement('p');
      p.className = 'transcript-line';
      p.textContent = text;
      transcriptLines.appendChild(p);
      scrollToBottom();
    }

    function scrollToBottom() {
      panelTranscript.scrollTop = panelTranscript.scrollHeight;
    }

    // ============================================================
    // 履歴表示
    // ============================================================
    function renderHistory() {
      panelHistory.innerHTML = '';
      if (history.length === 0) {
        const e = document.createElement('div');
        e.className = 'history-empty';
        e.textContent = '履歴はまだありません';
        panelHistory.appendChild(e);
        return;
      }
      history.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'history-card';

        const meta = document.createElement('div');
        meta.className = 'history-meta';
        meta.textContent = entry.date + (entry.cleaned ? '　✏️ 清書あり' : '　🎙️ ログのみ');

        const body = document.createElement('div');
        body.className = 'history-body';
        const text = entry.cleaned || entry.transcript;
        body.textContent = text.slice(0, 200) + (text.length > 200 ? '…' : '');

        const btn = document.createElement('button');
        btn.className = 'history-copy-btn';
        btn.textContent = '📋 コピー';
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(text).then(() => {
            btn.textContent = '✓ コピー済';
            setTimeout(() => { btn.textContent = '📋 コピー'; }, 1500);
          }).catch(() => showToast('コピーに失敗しました', 'error'));
        });

        card.appendChild(meta);
        card.appendChild(body);
        card.appendChild(btn);
        panelHistory.appendChild(card);
      });
    }

    // ============================================================
    // 録音制御
    // ============================================================
    function startRecording() {
      if (recognitionAlive) return;
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { showToast('音声認識が利用できません', 'error'); return; }

      recognition = new SR();
      recognition.continuous     = true;
      recognition.interimResults = true;
      recognition.lang           = 'ja-JP';

      recognition.onstart = () => { recognitionAlive = true; onStarted(); };
      recognition.onresult = (e) => {
        let interim = '', final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) final += t;
          else interim += t;
        }
        if (interim) { interimLine.textContent = interim; scrollToBottom(); }
        if (final) {
          transcript += final + '\n';
          interimLine.textContent = '';
          appendLine(final);
          saveTranscript();
        }
      };
      recognition.onend = () => { if (recognitionAlive) recognition.start(); };
      recognition.onerror = (e) => {
        if (e.error === 'no-speech') return;
        showToast('音声認識エラー: ' + e.error, 'error');
        if (e.error !== 'aborted') { recognitionAlive = false; onStopped(); }
      };
      recognition.start();
    }

    function stopRecording() {
      if (!recognition) return;
      recognitionAlive = false;
      const rec = recognition;
      recognition = null;
      rec.onend = () => onStopped();
      rec.stop();
    }

    function onStarted() {
      isRecording = true;
      toggleBtn.textContent = '■ 停止';
      toggleBtn.className = 'recording';
      switchPanel('transcript');
    }

    function onStopped() {
      isRecording = false;
      toggleBtn.textContent = '▶ 開始';
      toggleBtn.className = 'idle';

      const pending = interimLine.textContent.trim();
      if (pending) {
        transcript += pending + '\n';
        appendLine(pending);
        saveTranscript();
      }
      interimLine.textContent = '';

      if (transcript.trim()) runClean();
    }

    // ============================================================
    // 清書（GAS経由）
    // ============================================================
    async function runClean() {
      showToast('✍️ 清書中...', 'info');

      const prompt = `以下の音声文字起こしテキストを読みやすく整形してください。
【ルール】
・えー、あのー、えっと、なんか等のフィラーを除去する
・重複・言い淀みを削除する
・適切な句読点を追加する
・話し言葉のスタイルはそのまま維持する（文体・敬体は変えない）
・箇条書きや見出しにしない
・整形後のテキストのみ出力する（前置き・後書き禁止）

テキスト:
${transcript}`;

      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ accessKey: ACCESS_KEY, contents: [{ role: 'user', parts: [{ text: prompt }] }] })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        const cleanedText = data.text || '';

        addToHistory(transcript, cleanedText);

        navigator.clipboard.writeText(cleanedText).then(() => {
          showToast('✅ 清書してコピーしました', 'ok');
          setTimeout(() => autoClear(), 800);
        }).catch(() => {
          showToast('清書完了（コピーは手動でどうぞ）', 'info');
          setTimeout(() => autoClear(), 800);
        });

      } catch (err) {
        showToast('清書エラー: ' + err.message, 'error');
      }
    }

    // ============================================================
    // 自動クリア
    // ============================================================
    function autoClear() {
      transcript = '';
      saveTranscript();
      renderTranscript();
      switchPanel('transcript');
    }

    // ============================================================
    // トースト
    // ============================================================
    let toastTimer = null;
    function showToast(msg, type = 'info') {
      const toast = document.getElementById('toast');
      const colors = {
        ok:    { bg: '#052e16', fg: '#4ade80' },
        error: { bg: '#450a0a', fg: '#f87171' },
        info:  { bg: '#0f172a', fg: '#94a3b8' },
      };
      const c = colors[type] || colors.info;
      toast.style.background = c.bg;
      toast.style.color      = c.fg;
      toast.style.border     = `1px solid ${c.fg}44`;
      toast.textContent = msg;
      toast.style.opacity = '1';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 2500);
    }

    // ============================================================
    // イベント
    // ============================================================
    toggleBtn.addEventListener('click', () => {
      if (!isRecording) startRecording();
      else stopRecording();
    });
    tabTranscript.addEventListener('click', () => switchPanel('transcript'));
    tabHistory.addEventListener('click',    () => switchPanel('history'));

    // ============================================================
    // 初期化
    // ============================================================
    loadStorage();
    renderTranscript();
  </script>
</body>
</html>
